<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MockBot — Interview Session</title>
<link rel="stylesheet" href="design-system.css">
<style>
  .session-header { background: var(--paper-raised); border-bottom: 1px solid var(--mist-soft); }
  .session-header-inner { display:flex; align-items:center; justify-content:space-between; padding-top:var(--space-4); padding-bottom:var(--space-4); }
  .session-logo { font-family:var(--font-display); font-weight:700; font-size:var(--text-lg); color:var(--ink); }

  .session-main {
    max-width: 640px;
    margin: 0 auto;
    padding-left: var(--space-6);
    padding-right: var(--space-6);
    padding-top: var(--space-8);
    padding-bottom: var(--space-12);
  }

  .session-kicker {
    font-size: var(--text-sm);
    font-weight: 500;
    color: var(--mist);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: var(--space-3);
  }

  /* Journey bar — same pattern as the other screens */
  .journey { margin-bottom: var(--space-8); }
  .journey .path-label-row { display:flex; justify-content:space-between; margin-top: var(--space-2); }
  .journey .path-label-row span { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--mist); }
  .journey .path-label-row span.current { color: var(--sage); font-weight:600; }

  .session-progress { margin-bottom: var(--space-6); }

  .question-card { margin-bottom: var(--space-6); }
  .question-card h2 { margin-bottom: var(--space-2); }
  .question-hint { font-size: var(--text-sm); margin-bottom: var(--space-4); }
  .answer-textarea {
    width: 100%;
    min-height: 220px;
    padding: var(--space-4);
    border: 1px solid var(--mist-soft);
    border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-size: var(--text-base);
    line-height: 1.6;
    resize: vertical;
    color: var(--ink);
    box-sizing: border-box;
  }
  .answer-textarea:focus {
    outline: none;
    border-color: var(--sage);
    box-shadow: 0 0 0 3px var(--sage-soft);
  }

  .session-nav { display: flex; justify-content: space-between; align-items: center; }
  #prev-btn:disabled { visibility: hidden; }
</style>
</head>
<body>

<header class="session-header">
  <div class="session-header-inner container">
    <div class="session-logo">MockBot</div>
    <a href="dashboard.html" class="btn btn-quiet">Save &amp; exit</a>
  </div>
</header>

<main class="session-main">

  <h1 class="session-kicker">Interview Session</h1>

  <div class="journey">
    <div class="path-bar">
      <div class="path-stone is-done"></div>
      <div class="path-line"></div>
      <div class="path-stone is-done"></div>
      <div class="path-line"></div>
      <div class="path-stone is-active"></div>
      <div class="path-line"></div>
      <div class="path-stone"></div>
    </div>
    <div class="path-label-row">
      <span>Set up</span>
      <span>Questions</span>
      <span class="current">Interview</span>
      <span>Feedback</span>
    </div>
  </div>

  <div class="session-progress">
    <div class="path-bar" id="question-path"></div>
    <div class="path-label">
      <span id="question-counter">Question 1 of 8</span>
      <span id="session-timer" class="text-mono">session time &middot; 00:00</span>
    </div>
  </div>

  <div class="card question-card">
    <h2 id="question-text"></h2>
    <p class="text-mist question-hint">Take your time — type your answer as if you were saying it out loud.</p>
    <textarea id="answer-input" class="answer-textarea" placeholder="Start typing your answer..."></textarea>
  </div>

  <div class="session-nav">
    <button type="button" class="btn btn-quiet" id="prev-btn">&larr; Previous</button>
    <button type="button" class="btn btn-primary" id="next-btn">Next question &rarr;</button>
  </div>

</main>

<script>
  const questions = [
    "Explain the difference between SQL and NoSQL databases, and when you'd choose one over the other.",
    "What is the difference between a process and a thread?",
    "How would you design a rate limiter for an API?",
    "Explain RESTful API design principles.",
    "What is database indexing and how does it improve performance?",
    "Walk me through what happens when you type a URL into a browser and hit enter.",
    "What is the CAP theorem?",
    "How do you handle authentication vs authorization in a backend system?"
  ];

  let currentIndex = 0;
  let answers = new Array(questions.length).fill('');
  let seconds = 0;

  const questionText = document.getElementById('question-text');
  const questionCounter = document.getElementById('question-counter');
  const answerInput = document.getElementById('answer-input');
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  const sessionTimer = document.getElementById('session-timer');
  const questionPath = document.getElementById('question-path');

  function formatTime(totalSeconds) {
    const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
    const s = (totalSeconds % 60).toString().padStart(2, '0');
    return m + ':' + s;
  }

  function renderPath() {
    questionPath.innerHTML = '';
    questions.forEach((_, i) => {
      const stone = document.createElement('div');
      stone.className = 'path-stone';
      if (i === currentIndex) {
        stone.classList.add('is-active');
      } else if (answers[i].trim() !== '') {
        stone.classList.add('is-done');
      }
      questionPath.appendChild(stone);
      if (i < questions.length - 1) {
        const line = document.createElement('div');
        line.className = 'path-line';
        questionPath.appendChild(line);
      }
    });
  }

  function renderQuestion() {
    questionText.textContent = questions[currentIndex];
    questionCounter.textContent = `Question ${currentIndex + 1} of ${questions.length}`;
    answerInput.value = answers[currentIndex];
    prevBtn.style.visibility = currentIndex === 0 ? 'hidden' : 'visible';
    nextBtn.textContent = currentIndex === questions.length - 1 ? 'Finish session' : 'Next question →';
    renderPath();
  }

  function saveCurrent() {
    answers[currentIndex] = answerInput.value;
  }

  prevBtn.addEventListener('click', () => {
    saveCurrent();
    if (currentIndex > 0) {
      currentIndex--;
      renderQuestion();
    }
  });

  nextBtn.addEventListener('click', () => {
    saveCurrent();
    if (currentIndex < questions.length - 1) {
      currentIndex++;
      renderQuestion();
    } else {
      // --- Backend hookup goes here ---
      // POST `answers` (and elapsed `seconds`) to the Evaluation Module,
      // then navigate to the real per-session feedback once scoring
      // comes back. For now this goes straight to the sample feedback page.
      window.location.href = 'feedback.html';
    }
  });

  setInterval(() => {
    seconds++;
    sessionTimer.textContent = 'session time · ' + formatTime(seconds);
  }, 1000);

  renderQuestion();
</script>

</body>
</html>
