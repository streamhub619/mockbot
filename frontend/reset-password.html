<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MockBot — Reset Password</title>
<link rel="stylesheet" href="design-system.css">
<style>
  body.auth-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--space-6);
  }
  .auth-shell { width: 100%; max-width: 400px; }
  .auth-logo { text-align: center; margin-bottom: var(--space-8); }
  .auth-logo .mark {
    font-family: var(--font-display);
    font-size: var(--text-xl);
    font-weight: 700;
    color: var(--ink);
  }
  .auth-logo .tagline {
    font-size: var(--text-sm);
    color: var(--mist);
    margin-top: var(--space-1);
  }
  .auth-status {
    display: none;
    font-size: var(--text-sm);
    padding: var(--space-3);
    border-radius: var(--radius-sm);
    margin-bottom: var(--space-4);
    background: var(--sage-soft);
    color: var(--ink-soft);
  }
  .back-link {
    display: block;
    text-align: center;
    margin-top: var(--space-4);
    font-size: var(--text-sm);
    color: var(--sage);
  }
</style>
</head>
<body class="auth-page">

<div class="auth-shell">
  <div class="auth-logo">
    <div class="mark">MockBot</div>
    <div class="tagline">Set a new password for your account.</div>
  </div>

  <div class="card" id="reset-card">
    <h2>Choose a new password</h2>

    <div class="auth-status" id="status-message"></div>

    <form id="reset-form" novalidate>
      <div class="field">
        <label for="password">New password</label>
        <input type="password" id="password" placeholder="At least 8 characters">
        <div class="field-error" id="password-error" style="display:none;"></div>
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" placeholder="Re-enter your password">
        <div class="field-error" id="confirm-error" style="display:none;"></div>
      </div>
      <button type="submit" class="btn btn-primary" id="submit-btn"
        style="width:100%;justify-content:center;">Set new password</button>
    </form>
  </div>

  <a href="index.html" class="back-link">← Back to login</a>
</div>

<script src="api.js"></script>
<script src="reset-password-script.js"></script>
</body>
</html>
